<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NieR Hacking - Responsive Edition</title>
    <style>
        body { 
            margin: 0; background: #c8c2b5; overflow: hidden; 
            touch-action: none; font-family: 'Courier New', monospace; 
            cursor: crosshair; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; }
        
        /* אזהרת סיבוב מסך - תמיד בעדיפות עליונה */
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050505; color: #fff; z-index: 99999;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-weight: bold; font-size: 24px;
        }
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
        }

        /* מסך הפתיחה - מוצג כברירת מחדל */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #c8c2b5; z-index: 50000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 60px; background: #4a453a; color: #c8c2b5;
            border: 3px solid #4a453a; font-size: 32px; font-family: 'Courier New', monospace;
            font-weight: bold; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
        }

        #ui { 
            position: absolute; top: 15px; left: 15px; color: #5a554a; 
            font-size: 16px; font-weight: bold; pointer-events: none;
            text-shadow: 1px 1px 0px #fff; z-index: 10;
        }
        
        .joy-area {
            position: absolute; bottom: 0; width: 50%; height: 60%;
            display: flex; align-items: flex-end; padding-bottom: 30px; z-index: 5;
        }
        #left-area { left: 0; justify-content: flex-start; padding-left: 50px; }
        #right-area { right: 0; justify-content: flex-end; padding-right: 50px; }
        .stick-base {
            width: 110px; height: 110px; border: 2px solid rgba(90, 85, 74, 0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .stick-knob { width: 50px; height: 50px; background: rgba(90, 85, 74, 0.6); border-radius: 50%; }

        #restart-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 3000;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        #restart-btn {
            padding: 15px 40px; background: #4a453a; color: #dad4c8;
            border: 2px solid #dad4c8; font-size: 24px; font-weight: bold;
            cursor: pointer; font-family: 'Courier New', monospace;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .nier-popup {
            position: absolute; background: #dad4c8; color: #4a453a;
            border: 2px solid #4a453a; padding: 10px 15px;
            font-family: monospace; font-weight: bold; font-size: 14px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2); z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <div>SYSTEM ERROR</div>
        <div style="font-size: 16px; margin-top: 10px;">אנא סובבי את המכשיר לרוחב</div>
    </div>

    <div id="start-screen">
        <button id="start-btn">ACCESS CORE</button>
        <p style="margin-top: 20px; color: #5a554a; font-weight: bold;">[ INITIATING CONNECTION ]</p>
    </div>

    <audio id="bgm" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="ui">
        [ SYS : HACKING PROTOCOL ]<br>
        [ TARGET CORE: <span id="target-hp">100</span>% ]
    </div>
    
    <div id="left-area" class="joy-area"><div class="stick-base"><div class="stick-knob"></div></div></div>
    <div id="right-area" class="joy-area"><div class="stick-base"><div class="stick-knob"></div></div></div>
    
    <div id="restart-container">
        <button id="restart-btn">נסה שנית</button>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    const startScreen = document.getElementById('start-screen');
    const restartContainer = document.getElementById('restart-container');
    const startBtn = document.getElementById('start-btn');
    
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSynthSFX(type) {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'shoot') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gainNode.gain.setValueAtTime(0.01, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            gainNode.gain.setValueAtTime(0.08, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'win') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, now);
            osc.frequency.linearRampToValueAtTime(1000, now + 0.5);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    let player = { x: 0, y: 0, size: 9, hp: 3, angle: -Math.PI/2, lastShot: 0, invulnerableUntil: 0 };
    let core = { x: 0, y: 0, size: 14, hp: 15, maxHp: 15, lastShot: 0 }; 
    let walls = [], bullets = [], enemyBullets = [];
    
    let isGameActive = false;
    let isGameOver = false;  
    let hasMoved = false;     
    let gameStartTime = 0;

    let touchMoveDir = { x: 0, y: 0 };
    let touchAimDir = { x: 0, y: 0 };
    let lastShootDir = { x: 0, y: -1 };

    function initEnvironment() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.8;
        core.x = canvas.width / 2;
        core.y = canvas.height / 4;

        walls = [];
        for(let i=0; i<6; i++) {
            let angle = (i/6) * Math.PI * 2;
            walls.push({ x: core.x + Math.cos(angle)*38, y: core.y + Math.sin(angle)*38, hp: 4, size: 14 });
        }
        for(let i=0; i<8; i++) {
            let angle = (i/8) * Math.PI * 2;
            walls.push({ x: 0, y: 0, angle: angle, dist: 65, hp: 3, size: 10, rotate: true, speed: 0.015 });
        }
    }

    // פונקציית עדכון גודל בסיבוב מסך
    window.addEventListener('resize', () => {
        initEnvironment();
        // אם המשחק כבר פעיל, נעדכן את הציור
        if (isGameActive && !isGameOver) {
            draw();
        }
    });

    startBtn.addEventListener('pointerdown', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        bgm.volume = 0.8;
        bgm.play().catch(e => console.log("BGM error"));
        
        startScreen.style.display = 'none';
        isGameActive = true;
        initEnvironment();
        requestAnimationFrame(loop);
    });

    document.getElementById('restart-btn').addEventListener('pointerdown', () => {
        window.location.reload();
    });

    window.addEventListener('touchstart', (e) => { 
        if(isGameActive && !isGameOver) { 
            if (!hasMoved) { hasMoved = true; gameStartTime = Date.now(); }
            handleTouch(e); 
        }
    }, {passive: false});

    window.addEventListener('touchmove', (e) => { if(isGameActive && !isGameOver) handleTouch(e); }, {passive: false});

    function handleTouch(e) {
        for(let t of e.touches) {
            let isLeft = t.clientX < window.innerWidth/2;
            let centerX = isLeft ? 105 : window.innerWidth - 105;
            let centerY = window.innerHeight - 85; 
            let dx = t.clientX - centerX;
            let dy = t.clientY - centerY;
            let dist = Math.hypot(dx, dy);
            let angle = Math.atan2(dy, dx);

            if(isLeft) {
                let power = Math.min(dist / 45, 1);
                touchMoveDir = { x: Math.cos(angle) * power, y: Math.sin(angle) * power };
            } else {
                if (dist > 10) { 
                    touchAimDir = { x: Math.cos(angle), y: Math.sin(angle) };
                    lastShootDir = touchAimDir;
                    player.angle = angle;
                }
            }
        }
        e.preventDefault();
    }

    function loop(time) {
        if(!isGameActive || isGameOver) return;
        update(time);
        draw();
        requestAnimationFrame(loop);
    }

    function update(time) {
        let timeLeft = 60;
        if (hasMoved) timeLeft = 60 - Math.floor((Date.now() - gameStartTime) / 1000);
        if (timeLeft <= 0) { triggerLoss(); return; }

        player.x += touchMoveDir.x * 4.5;
        player.y += touchMoveDir.y * 4.5;
        player.x = Math.max(15, Math.min(canvas.width-15, player.x));
        player.y = Math.max(15, Math.min(canvas.height-15, player.y));

        if(hasMoved && time - player.lastShot > 110) {
            bullets.push({ x: player.x, y: player.y, vx: lastShootDir.x * 12, vy: lastShootDir.y * 12 });
            player.lastShot = time;
            playSynthSFX('shoot');
        }

        if (time - core.lastShot > 1200) { 
            let angleToPlayer = Math.atan2(player.y - core.y, player.x - core.x);
            for(let offset of [-0.1, 0, 0.1]) {
                enemyBullets.push({ x: core.x, y: core.y, vx: Math.cos(angleToPlayer + offset) * 3.5, vy: Math.sin(angleToPlayer + offset) * 3.5 });
            }
            core.lastShot = time;
        }

        walls.forEach(w => {
            if(w.rotate) {
                w.angle += w.speed;
                w.x = core.x + Math.cos(w.angle) * w.dist;
                w.y = core.y + Math.sin(w.angle) * w.dist;
            }
        });

        for (let bi = bullets.length - 1; bi >= 0; bi--) {
            let b = bullets[bi]; b.x += b.vx; b.y += b.vy;
            let hit = false;
            for (let wi = walls.length - 1; wi >= 0; wi--) {
                let w = walls[wi];
                if(Math.hypot(b.x - w.x, b.y - w.y) < w.size/2 + 3) { w.hp--; hit = true; playSynthSFX('hit'); if(w.hp <= 0) walls.splice(wi, 1); break; }
            }
            if (!hit && Math.hypot(b.x - core.x, b.y - core.y) < core.size) {
                core.hp -= 0.2; hit = true; playSynthSFX('hit');
                document.getElementById('target-hp').innerText = Math.max(0, Math.floor((core.hp/core.maxHp)*100));
                if(core.hp <= 0) triggerWin();
            }
            if (hit || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(bi, 1);
        }

        for (let ei = enemyBullets.length - 1; ei >= 0; ei--) {
            let eb = enemyBullets[ei]; eb.x += eb.vx; eb.y += eb.vy;
            if (hasMoved && time > player.invulnerableUntil && Math.hypot(eb.x - player.x, eb.y - player.y) < player.size + 2) {
                player.hp -= 1; player.invulnerableUntil = time + 1500;
                if (player.hp <= 0) triggerLoss(); else playSynthSFX('hit');
                enemyBullets.splice(ei, 1); continue;
            }
            if (eb.x < 0 || eb.x > canvas.width || eb.y < 0 || eb.y > canvas.height) enemyBullets.splice(ei, 1);
        }
    }

    function draw() {
        ctx.fillStyle = "#c8c2b5";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        walls.forEach(w => {
            ctx.fillStyle = "#5a554a";
            ctx.save(); ctx.translate(w.x, w.y); ctx.rotate(w.angle || 0);
            ctx.fillRect(-w.size/2, -w.size/2, w.size, w.size);
            ctx.strokeStyle = "#c8c2b5"; ctx.lineWidth = 1.5; ctx.strokeRect(-w.size/2, -w.size/2, w.size, w.size);
            ctx.restore();
        });

        bullets.forEach(b => {
            ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
        });

        enemyBullets.forEach(eb => {
            ctx.fillStyle = "#ff3366"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill();
        });

        ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(core.x, core.y, core.size, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle + Math.PI/2);
        let time = Date.now();
        if (!(hasMoved && time < player.invulnerableUntil && Math.floor(time / 100) % 2 === 0)) {
            ctx.fillStyle = "#111"; ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
            if (player.hp >= 1) { ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-4, 5); ctx.lineTo(4, 5); ctx.closePath(); ctx.fill(); ctx.stroke(); }
            if (player.hp >= 2) { ctx.beginPath(); ctx.moveTo(3, -2); ctx.lineTo(9, 7); ctx.lineTo(4, 5); ctx.closePath(); ctx.fill(); ctx.stroke(); }
            if (player.hp >= 3) { ctx.beginPath(); ctx.moveTo(-3, -2); ctx.lineTo(-9, 7); ctx.lineTo(-4, 5); ctx.closePath(); ctx.fill(); ctx.stroke(); }
        }
        ctx.restore();
    }

    function triggerLoss() {
        isGameOver = true; bgm.pause();
        restartContainer.style.display = 'flex';
    }

    function triggerWin() {
        isGameOver = true; bgm.pause();
        alert("המערכת נפרצה בהצלחה"); location.reload();
    }

    initEnvironment();
    draw();
</script>
</body>
</html>
