<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NieR Hacking - Tactical Interface</title>
    <style>
        body { 
            margin: 0; background: #c8c2b5; overflow: hidden; 
            touch-action: none; font-family: 'Courier New', monospace; 
            cursor: crosshair; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; }
        
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; color: #fff; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-weight: bold; font-size: 24px;
        }
        @media screen and (orientation: portrait) { #orientation-warning { display: flex; } }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #c8c2b5; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 60px; background: #4a453a; color: #c8c2b5;
            border: 3px solid #4a453a; font-size: 32px; font-family: 'Courier New', monospace;
            font-weight: bold; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
        }

        #top-ui { 
            position: absolute; top: 15px; left: 15px; color: #4a453a; 
            font-size: 14px; font-weight: bold; pointer-events: none;
            z-index: 10; background: rgba(200, 194, 181, 0.7);
            padding: 5px 10px; border-left: 4px solid #4a453a;
        }
        
        .joy-area { position: absolute; bottom: 0; width: 50%; height: 60%; display: flex; align-items: flex-end; padding-bottom: 30px; z-index: 5; }
        #left-area { left: 0; justify-content: flex-start; padding-left: 50px; }
        #right-area { right: 0; justify-content: flex-end; padding-right: 50px; }
        .stick-base { width: 110px; height: 110px; border: 2px solid rgba(90, 85, 74, 0.4); border-radius: 50%; position: relative; }
        .stick-knob { width: 50px; height: 50px; background: rgba(90, 85, 74, 0.8); border-radius: 50%; position: absolute; left: 30px; top: 30px; }

        .nier-popup { position: absolute; background: #dad4c8; color: #4a453a; border: 2px solid #4a453a; padding: 10px 15px; z-index: 1000; }
        .nier-popup-header { background: #4a453a; color: #dad4c8; padding: 2px 5px; margin: -10px -15px 10px -15px; font-size: 12px; }

        #restart-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
        #restart-btn { padding: 15px 40px; background: #4a453a; color: #dad4c8; border: 2px solid #dad4c8; font-size: 24px; font-weight: bold; cursor: pointer; }

        #win-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(200, 194, 181, 0.9); z-index: 4000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .nier-win-box { border: 2px solid #4a453a; background: #dad4c8; padding: 40px; width: 80%; max-width: 400px; text-align: center; box-shadow: 10px 10px 0px #4a453a; }
        .win-header { background: #4a453a; color: #dad4c8; margin: -40px -40px 30px -40px; padding: 10px; font-weight: bold; }
        .code-display { font-size: 36px; margin: 25px 0; padding: 15px; border: 2px dashed #4a453a; color: #4a453a; font-weight: bold; background: rgba(255,255,255,0.3); }
        #continue-btn { background: none; border: 2px solid #4a453a; color: #4a453a; padding: 10px 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="orientation-warning"><div>SYSTEM ERROR</div><div style="font-size: 16px; margin-top: 10px;">Please rotate your device to landscape</div></div>
    <div id="start-screen"><button id="start-btn">ACCESS CORE</button></div>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="top-ui">
        [ SYS : PROTOCOL v1.058 ]<br>
        [ BOX: <span id="box-id-ui">ALPHA</span> ]<br>
        [ HACKING: <span id="hack-progress">0</span>% ]
    </div>
    
    <div id="left-area" class="joy-area"><div class="stick-base"><div class="stick-knob" id="left-knob"></div></div></div>
    <div id="right-area" class="joy-area"><div class="stick-base"><div class="stick-knob" id="right-knob"></div></div></div>
    
    <div id="restart-container"><button id="restart-btn" onclick="location.reload()">RETRY</button></div>

    <div id="win-container">
        <div class="nier-win-box">
            <div class="win-header">SYSTEM STATUS: SUCCESS</div>
            <p>DATA DECRYPTION COMPLETE</p>
            <div class="code-display" id="unlock-code">----</div>
            <button id="continue-btn" onclick="location.reload()">RETURN</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
    // --- הגדרות התיבות ---
    const BOX_CONFIGS = {
        '1': { code: '1234', coreHp: 7.5, walls: 6, time: 60, title: 'ALPHA' },
        '2': { code: '5582', coreHp: 15, walls: 9, time: 45, title: 'BETA' },
        '3': { code: '9012', coreHp: 25, walls: 14, time: 30, title: 'GAMMA' }
    };

    // חילוץ פרמטר התיבה מה-URL
    const urlParams = new URLSearchParams(window.location.search);
    let boxId = urlParams.get('box') || '1';
    if (!BOX_CONFIGS[boxId]) boxId = '1'; // הגנה למקרה של מספר לא קיים
    const config = BOX_CONFIGS[boxId];

    // עדכון ה-UI ההתחלתי
    document.getElementById('box-id-ui').innerText = config.title;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    const startScreen = document.getElementById('start-screen');
    const progressText = document.getElementById('hack-progress');
    
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSynthSFX(type) {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'shoot') { osc.type = 'square'; osc.frequency.setValueAtTime(800, now); gainNode.gain.setValueAtTime(0.01, now); osc.start(now); osc.stop(now + 0.1); }
        else if (type === 'win') { osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.linearRampToValueAtTime(1000, now + 0.5); gainNode.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.5); }
    }

    let player = { x: 0, y: 0, size: 9, hp: 3, angle: -Math.PI/2, lastShot: 0, invulnerableUntil: 0 };
    let core = { x: 0, y: 0, size: 22, hp: config.coreHp, maxHp: config.coreHp, lastShot: 0 }; 
    let walls = [], bullets = [], enemyBullets = [];
    let isGameActive = false, isGameOver = false, hasMoved = false, gameStartTime = 0;
    let touchMoveDir = { x: 0, y: 0 }, touchAimDir = { x: 0, y: 0 }, lastShootDir = { x: 0, y: -1 };

    function initEnvironment() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        walls = []; bullets = []; enemyBullets = [];
        player.x = canvas.width / 2; player.y = canvas.height * 0.8; player.hp = 3;
        core.x = canvas.width / 2; core.y = canvas.height / 4; 
        core.hp = config.coreHp; core.maxHp = config.coreHp; // עדכון קריטי כאן

        for(let i=0; i<config.walls; i++) {
            let angle = (i/config.walls) * Math.PI * 2;
            walls.push({ x: core.x + Math.cos(angle)*45, y: core.y + Math.sin(angle)*45, hp: 4, size: 14 });
        }
        for(let i=0; i<8; i++) {
            let angle = (i/8) * Math.PI * 2;
            walls.push({ x: 0, y: 0, angle: angle, dist: 75, hp: 3, size: 10, rotate: true, speed: 0.015 });
        }
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        initEnvironment();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (bgm) { bgm.volume = 0.5; bgm.play().catch(() => {}); }
        startScreen.style.display = 'none';
        isGameActive = true;
        requestAnimationFrame(loop);
    });

    function handleTouches(e) {
        let leftActive = false, rightActive = false;
        for(let t of e.touches) {
            if (t.clientX < window.innerWidth / 2) {
                leftActive = true;
                let dx = t.clientX - 105, dy = t.clientY - (window.innerHeight - 85);
                let angle = Math.atan2(dy, dx), dist = Math.min(Math.hypot(dx, dy), 45);
                document.getElementById('left-knob').style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                touchMoveDir = { x: Math.cos(angle) * (dist/45), y: Math.sin(angle) * (dist/45) };
            } else {
                rightActive = true;
                let dx = t.clientX - (window.innerWidth - 105), dy = t.clientY - (window.innerHeight - 85);
                let angle = Math.atan2(dy, dx), dist = Math.min(Math.hypot(dx, dy), 45);
                document.getElementById('right-knob').style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                if (dist > 10) { touchAimDir = { x: Math.cos(angle), y: Math.sin(angle) }; lastShootDir = touchAimDir; player.angle = angle; }
            }
        }
        if (!leftActive) { touchMoveDir = { x: 0, y: 0 }; document.getElementById('left-knob').style.transform = 'translate(0,0)'; }
        if (!rightActive) { touchAimDir = { x: 0, y: 0 }; document.getElementById('right-knob').style.transform = 'translate(0,0)'; }
        e.preventDefault();
    }

    window.addEventListener('touchstart', (e) => { if(isGameActive && !isGameOver) { hasMoved = true; if(!gameStartTime) gameStartTime = Date.now(); handleTouches(e); } }, {passive: false});
    window.addEventListener('touchmove', (e) => { if(isGameActive && !isGameOver) handleTouches(e); }, {passive: false});
    window.addEventListener('touchend', (e) => { if(isGameActive && !isGameOver) handleTouches(e); });

    function loop(time) {
        if(!isGameActive || isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let timeLeft = config.time;
        if (hasMoved) timeLeft = config.time - Math.floor((Date.now() - gameStartTime) / 1000);
        if (timeLeft <= 0) { isGameOver = true; document.getElementById('restart-container').style.display = 'flex'; return; }

        player.x = Math.max(15, Math.min(canvas.width-15, player.x + touchMoveDir.x * 3));
        player.y = Math.max(15, Math.min(canvas.height-15, player.y + touchMoveDir.y * 3));

        if(hasMoved && time - player.lastShot > 110 && (touchAimDir.x !== 0 || touchAimDir.y !== 0)) {
            bullets.push({ x: player.x, y: player.y, vx: lastShootDir.x * 12, vy: lastShootDir.y * 12 });
            player.lastShot = time; playSynthSFX('shoot');
        }

        if (time - core.lastShot > 1200) { 
            let angle = Math.atan2(player.y - core.y, player.x - core.x);
            for(let o of [-0.1, 0, 0.1]) enemyBullets.push({ x: core.x, y: core.y, vx: Math.cos(angle + o) * 3.5, vy: Math.sin(angle + o) * 3.5 });
            core.lastShot = time;
        }

        walls.forEach((w) => {
            if(w.rotate) { w.angle += w.speed; w.x = core.x + Math.cos(w.angle) * w.dist; w.y = core.y + Math.sin(w.angle) * w.dist; }
            ctx.fillStyle = "#5a554a"; ctx.save(); ctx.translate(w.x, w.y); ctx.rotate(w.angle || 0); ctx.fillRect(-w.size/2, -w.size/2, w.size, w.size); ctx.restore();
        });

        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, 7); ctx.fill();
            walls.forEach((w, wi) => { if(Math.hypot(b.x - w.x, b.y - w.y) < w.size/2 + 3) { w.hp--; bullets.splice(i,1); if(w.hp<=0) walls.splice(wi,1); } });
            if(Math.hypot(b.x - core.x, b.y - core.y) < core.size) { 
                core.hp -= 0.2; bullets.splice(i,1); 
                progressText.innerText = Math.min(100, Math.floor((1 - core.hp/core.maxHp) * 100));
                if(core.hp <= 0) { isGameOver = true; document.getElementById('unlock-code').innerText = config.code; document.getElementById('win-container').style.display = 'flex'; playSynthSFX('win'); }
            }
        });

        enemyBullets.forEach((eb, i) => {
            eb.x += eb.vx; eb.y += eb.vy; ctx.fillStyle = "#ff3366"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, 7); ctx.fill();
            if (time > player.invulnerableUntil && Math.hypot(eb.x - player.x, eb.y - player.y) < player.size + 2) {
                player.hp--; player.invulnerableUntil = time + 1500; enemyBullets.splice(i,1);
                if (player.hp <= 0) { isGameOver = true; document.getElementById('restart-container').style.display = 'flex'; }
            }
        });

        ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(core.x, core.y, core.size, 0, 7); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = "#5a554a"; ctx.font = "bold 14px monospace"; ctx.fillText(timeLeft + "s", player.x + 18, player.y - 18);

        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle + Math.PI/2);
        ctx.fillStyle = (time < player.invulnerableUntil && Math.floor(time/100)%2==0) ? "transparent" : "#111";
        ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-7, 7); ctx.lineTo(7, 7); ctx.fill(); ctx.restore();

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
